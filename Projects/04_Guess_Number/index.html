<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Guess Number Game</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --accent-color: #38bdf8;
            --text-color: #f8fafc;
            --secondary-text: #94a3b8;
            --input-bg: #1e293b;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Outfit', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            background-image: radial-gradient(circle at 50% 50%, #1e293b 0%, #0f172a 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: var(--text-color);
        }

        .container {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            padding: 3rem;
            border-radius: 24px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.1);
            width: 100%;
            max-width: 500px;
            text-align: center;
            transition: transform 0.3s ease;
        }

        .container:hover {
            transform: translateY(-5px);
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 2rem;
            background: linear-gradient(to right, #38bdf8, #818cf8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        input {
            width: 100%;
            padding: 1rem;
            border-radius: 12px;
            border: 2px solid transparent;
            background: var(--input-bg);
            color: white;
            font-size: 1.2rem;
            text-align: center;
            margin-bottom: 2rem;
            outline: none;
            transition: all 0.3s ease;
            box-shadow: inset 0 2px 4px rgba(0, 0, 0, 0.3);
        }

        input:focus {
            border-color: var(--accent-color);
            box-shadow: 0 0 15px rgba(56, 189, 248, 0.3);
        }

        button {
            width: 100%;
            padding: 1rem;
            border-radius: 12px;
            border: none;
            background: linear-gradient(to right, #38bdf8, #818cf8);
            color: white;
            font-size: 1.2rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-bottom: 2rem;
            box-shadow: 0 4px 15px rgba(56, 189, 248, 0.4);
        }

        button:hover {
            transform: scale(1.02);
            box-shadow: 0 6px 20px rgba(56, 189, 248, 0.6);
            opacity: 0.9;
        }

        button:active {
            transform: scale(0.98);
        }

        h2 {
            font-size: 1.1rem;
            font-weight: 400;
            color: var(--secondary-text);
            margin: 1rem 0;
            padding: 0.5rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .result-area {
            margin-top: 1rem;
        }

        .guess-history {
            margin-top: 2rem;
            padding-top: 1rem;
            border-top: 1px dashed rgba(255, 255, 255, 0.2);
        }

        #realAndGuessed {
            color: var(--accent-color);
            font-weight: 600;
        }

        #history {
            color: #818cf8;
            font-style: italic;
        }
    </style>
</head>

<body>

    <div class="container">
        <h1>guess number</h1>

        <input type="number" id="guessInput" placeholder="Enter your guess (1-100)">
        <button id="submit">Guess it!</button>

        <div id="result-area">
            <h2 id="realAndGuessed">real number and guessed number</h2>
        </div>

        <div id="guess-history">
            <h2 id="history">recent guesses !</h2>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
